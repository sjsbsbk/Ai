<!-- public/index.html -->

<!doctype html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reham AI</title>

  <style>
    :root {
      --bg: #02040b;
      --blue: #2f8cff;
      --blue-2: #65c7ff;
      --text: #f6f8ff;
      --muted: rgba(240, 245, 255, 0.62);
      --border: rgba(85, 172, 255, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 620px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 26%, rgba(15, 69, 148, 0.34), transparent 27%),
        radial-gradient(circle at 50% 72%, rgba(4, 49, 132, 0.22), transparent 32%),
        linear-gradient(180deg, #01030a 0%, #030610 48%, #010309 100%);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: -35%;
      background:
        radial-gradient(circle at 50% 32%, rgba(44, 139, 255, 0.18), transparent 19%),
        conic-gradient(from 220deg at 50% 38%, transparent 0 24deg, rgba(38, 139, 255, 0.16) 48deg, transparent 78deg, transparent 100%);
      filter: blur(28px);
      opacity: 0.8;
      pointer-events: none;
      animation: aura 10s ease-in-out infinite alternate;
    }

    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at 50% 42%, rgba(0,0,0,0.7), transparent 72%);
      pointer-events: none;
    }

    @keyframes aura {
      from {
        transform: rotate(-5deg) scale(1);
      }

      to {
        transform: rotate(5deg) scale(1.06);
      }
    }

    .top-actions {
      position: absolute;
      top: 22px;
      right: 22px;
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .model-box {
      width: 96px;
      height: 40px;
      border: 1px solid rgba(73, 157, 255, 0.28);
      outline: none;
      color: rgba(238, 246, 255, 0.86);
      background: rgba(2, 8, 24, 0.52);
      border-radius: 999px;
      text-align: center;
      box-shadow: inset 0 0 22px rgba(26, 115, 255, 0.12), 0 0 22px rgba(24, 98, 255, 0.07);
    }

    .clear-btn {
      height: 40px;
      border: 1px solid rgba(73, 157, 255, 0.23);
      background: rgba(2, 8, 24, 0.48);
      color: rgba(238, 246, 255, 0.72);
      border-radius: 999px;
      padding: 0 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .clear-btn:hover,
    .model-box:focus {
      border-color: rgba(103, 195, 255, 0.7);
      box-shadow: 0 0 24px rgba(31, 130, 255, 0.22);
    }

    .hero {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      justify-items: center;
      padding: 34px 22px 132px;
      z-index: 2;
      transition: opacity 0.28s ease, transform 0.28s ease, visibility 0.28s ease;
    }

    .hero.hidden {
      opacity: 0;
      transform: translateY(-18px) scale(0.98);
      visibility: hidden;
      pointer-events: none;
    }

    .hero-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 760px;
      padding-top: 16px;
    }

    .bot-wrap {
      position: relative;
      width: min(66vw, 430px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      margin-bottom: clamp(28px, 4vh, 46px);
      filter: drop-shadow(0 0 22px rgba(46, 142, 255, 0.32));
    }

    .neon-ring {
      position: absolute;
      width: 86%;
      height: 86%;
      border-radius: 50%;
      border: 5px solid rgba(83, 177, 255, 0.95);
      box-shadow:
        0 0 12px rgba(105, 196, 255, 0.95),
        0 0 28px rgba(49, 139, 255, 0.82),
        0 0 68px rgba(26, 100, 255, 0.45),
        inset 0 0 28px rgba(35, 129, 255, 0.45);
      animation: ringPulse 2.8s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% {
        filter: brightness(1);
        transform: scale(1);
      }

      50% {
        filter: brightness(1.18);
        transform: scale(1.012);
      }
    }

    .star {
      position: absolute;
      top: 14.5%;
      right: 18%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow:
        0 0 10px #fff,
        0 0 20px #8bdcff,
        0 0 46px #288cff,
        0 0 78px #287cff;
      animation: star 2.4s ease-in-out infinite;
    }

    .star::before,
    .star::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(90deg, transparent, #fff, transparent);
      width: 86px;
      height: 2px;
      opacity: 0.95;
    }

    .star::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    @keyframes star {
      0%, 100% {
        transform: scale(0.85);
        opacity: 0.78;
      }

      50% {
        transform: scale(1.18);
        opacity: 1;
      }
    }

    .bot {
      position: relative;
      width: 68%;
      height: 68%;
      margin-top: 18%;
    }

    .hood {
      position: absolute;
      left: 50%;
      top: 0;
      width: 58%;
      height: 58%;
      transform: translateX(-50%);
      border-radius: 50% 50% 42% 42% / 52% 52% 46% 46%;
      background:
        radial-gradient(circle at 50% 76%, #01030a 0 37%, transparent 38%),
        linear-gradient(135deg, rgba(91, 183, 255, 0.95), rgba(20, 54, 159, 0.5) 30%, #01030a 62%);
      box-shadow:
        0 -5px 18px rgba(90, 190, 255, 0.72),
        inset 10px 4px 16px rgba(126, 209, 255, 0.64),
        inset -18px -10px 28px rgba(10, 40, 132, 0.72);
      overflow: hidden;
    }

    .hood::after {
      content: "";
      position: absolute;
      inset: 18% 14% 8%;
      border-radius: 50% 50% 46% 46%;
      background: #02030a;
      box-shadow: inset 0 0 24px rgba(18, 57, 139, 0.7);
    }

    .body-shape {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 86%;
      height: 55%;
      transform: translateX(-50%);
      border-radius: 48% 48% 22% 22% / 55% 55% 28% 28%;
      background:
        radial-gradient(circle at 50% 0%, rgba(50, 140, 255, 0.45), transparent 35%),
        linear-gradient(145deg, rgba(14, 35, 93, 0.92), #02040b 62%);
      box-shadow:
        0 -8px 22px rgba(57, 146, 255, 0.45),
        inset 14px 8px 30px rgba(80, 170, 255, 0.22),
        inset -18px -16px 34px rgba(0, 0, 0, 0.72);
    }

    .eye {
      position: absolute;
      top: 35%;
      width: 10.5%;
      height: 10.5%;
      border-radius: 50%;
      background: #7de4ff;
      box-shadow:
        0 0 12px #75dcff,
        0 0 24px rgba(45, 153, 255, 0.95),
        0 0 46px rgba(45, 153, 255, 0.55);
      z-index: 3;
    }

    .eye.left {
      left: 39%;
    }

    .eye.right {
      right: 39%;
    }

    .lock {
      position: absolute;
      left: 50%;
      bottom: 13%;
      width: 23%;
      height: 18%;
      transform: translateX(-50%);
      border: 5px solid rgba(91, 189, 255, 0.9);
      border-radius: 13px;
      box-shadow: 0 0 14px rgba(78, 180, 255, 0.9), inset 0 0 14px rgba(53, 145, 255, 0.28);
      z-index: 4;
    }

    .lock::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 77%;
      width: 70%;
      height: 78%;
      transform: translateX(-50%);
      border: 5px solid rgba(91, 189, 255, 0.9);
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      box-shadow: 0 0 14px rgba(78, 180, 255, 0.7);
    }

    .lock::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 42%;
      width: 8px;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: #83e5ff;
      box-shadow: 0 0 12px #62d1ff;
    }

    .headline {
      text-align: center;
      margin-top: -6px;
    }

    .headline h1 {
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.055em;
      line-height: 1.02;
      font-size: clamp(42px, 7vw, 82px);
      text-shadow: 0 0 24px rgba(126, 185, 255, 0.12);
    }

    .headline .white {
      color: #fbfbff;
    }

    .headline .blue {
      display: block;
      color: var(--blue);
      text-shadow:
        0 0 18px rgba(47, 140, 255, 0.44),
        0 0 50px rgba(47, 140, 255, 0.22);
    }

    .headline p {
      margin: 24px 0 0;
      font-size: clamp(16px, 2.2vw, 23px);
      color: rgba(245, 248, 255, 0.62);
      letter-spacing: -0.02em;
    }

    .chat-layer {
      position: absolute;
      z-index: 3;
      inset: 72px 0 112px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .messages {
      width: min(840px, calc(100vw - 24px));
      height: 100%;
      padding: 12px 6px 24px;
      overflow-y: auto;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      scrollbar-width: thin;
      scrollbar-color: rgba(66, 151, 255, 0.45) transparent;
    }

    .messages.active {
      opacity: 1;
      transform: translateY(0);
    }

    .msg {
      display: flex;
      margin: 12px 0;
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(690px, 86vw);
      padding: 15px 17px;
      border-radius: 22px;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      backdrop-filter: blur(16px);
      direction: auto;
    }

    .msg.user .bubble {
      color: #fff;
      background: linear-gradient(135deg, rgba(25, 125, 255, 0.95), rgba(38, 82, 218, 0.92));
      border-bottom-right-radius: 8px;
      box-shadow: 0 14px 35px rgba(34, 115, 255, 0.22);
    }

    .msg.assistant .bubble {
      color: rgba(244, 248, 255, 0.92);
      background: rgba(5, 15, 37, 0.78);
      border: 1px solid rgba(76, 157, 255, 0.22);
      border-bottom-left-radius: 8px;
      box-shadow: inset 0 0 24px rgba(47, 140, 255, 0.08), 0 16px 40px rgba(0,0,0,0.25);
    }

    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      height: 24px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #71d5ff;
      box-shadow: 0 0 12px rgba(78, 181, 255, 0.9);
      animation: typing 0.9s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.14s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.28s;
    }

    @keyframes typing {
      0%, 80%, 100% {
        opacity: 0.35;
        transform: translateY(0);
      }

      40% {
        opacity: 1;
        transform: translateY(-5px);
      }
    }

    .composer {
      position: absolute;
      z-index: 8;
      left: 50%;
      bottom: clamp(18px, 5vh, 48px);
      width: min(820px, calc(100vw - 28px));
      transform: translateX(-50%);
    }

    .input-shell {
      min-height: 76px;
      display: grid;
      grid-template-columns: 58px 1fr 48px 58px;
      gap: 12px;
      align-items: center;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(83, 169, 255, 0.36);
      background:
        linear-gradient(180deg, rgba(10, 31, 74, 0.62), rgba(3, 9, 25, 0.86));
      box-shadow:
        inset 0 0 28px rgba(61, 151, 255, 0.12),
        0 0 0 1px rgba(255,255,255,0.025),
        0 0 32px rgba(38, 127, 255, 0.25),
        0 15px 50px rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(18px);
    }

    .icon-btn,
    .send-btn {
      border: 0;
      outline: none;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #cfeaff;
      transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .icon-btn {
      background:
        radial-gradient(circle at 38% 30%, rgba(85, 174, 255, 0.38), transparent 38%),
        rgba(13, 43, 102, 0.66);
      border: 1px solid rgba(91, 178, 255, 0.22);
      box-shadow: inset 0 0 22px rgba(51, 128, 255, 0.2), 0 8px 25px rgba(0,0,0,0.28);
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: inset 0 0 26px rgba(51, 128, 255, 0.28), 0 0 28px rgba(44, 134, 255, 0.28);
    }

    .send-btn {
      background: linear-gradient(135deg, #33a3ff, #145dff);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.32), 0 0 22px rgba(28, 115, 255, 0.65);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.38), 0 0 34px rgba(52, 146, 255, 0.86);
    }

    .send-btn:disabled {
      opacity: 0.58;
      cursor: wait;
      transform: none;
    }

    .icon-btn svg,
    .send-btn svg {
      width: 29px;
      height: 29px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .send-btn svg {
      width: 31px;
      height: 31px;
      stroke-width: 3.1;
      color: white;
    }

    .mic-btn {
      width: 48px;
      height: 48px;
      color: rgba(121, 188, 255, 0.92);
      background: transparent;
      border: 0;
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0.95;
    }

    .mic-btn svg {
      width: 31px;
      height: 31px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.25;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(44, 134, 255, 0.58));
    }

    textarea {
      width: 100%;
      min-height: 38px;
      max-height: 132px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: rgba(249, 251, 255, 0.94);
      font: inherit;
      font-size: 20px;
      line-height: 1.55;
      padding: 8px 2px;
      scrollbar-width: none;
      direction: auto;
    }

    textarea::placeholder {
      color: rgba(238, 243, 255, 0.64);
    }

    .toast {
      position: absolute;
      z-index: 30;
      left: 50%;
      top: 22px;
      transform: translateX(-50%) translateY(-12px);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      background: rgba(3, 12, 31, 0.86);
      border: 1px solid rgba(83, 169, 255, 0.28);
      color: rgba(248, 251, 255, 0.9);
      border-radius: 999px;
      padding: 11px 16px;
      box-shadow: 0 0 30px rgba(35, 124, 255, 0.18);
      backdrop-filter: blur(14px);
      text-align: center;
      max-width: calc(100vw - 28px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 680px) {
      .app {
        min-height: 560px;
      }

      .top-actions {
        top: 14px;
        right: 14px;
      }

      .clear-btn {
        display: none;
      }

      .hero {
        padding: 28px 18px 118px;
      }

      .hero-main {
        justify-content: center;
      }

      .bot-wrap {
        width: min(86vw, 360px);
        margin-bottom: 30px;
      }

      .headline h1 {
        font-size: clamp(43px, 13vw, 60px);
      }

      .headline p {
        margin-top: 18px;
        font-size: 17px;
      }

      .chat-layer {
        inset: 58px 0 104px;
      }

      .messages {
        width: calc(100vw - 18px);
      }

      .composer {
        width: calc(100vw - 28px);
        bottom: 22px;
      }

      .input-shell {
        min-height: 70px;
        grid-template-columns: 52px 1fr 38px 52px;
        gap: 8px;
        padding: 8px 10px;
      }

      .icon-btn,
      .send-btn {
        width: 52px;
        height: 52px;
      }

      .mic-btn {
        width: 38px;
        height: 44px;
      }

      textarea {
        font-size: 17px;
      }
    }

    @media (max-height: 760px) {
      .bot-wrap {
        width: min(50vh, 390px);
        margin-bottom: 18px;
      }

      .headline h1 {
        font-size: clamp(38px, 6vw, 66px);
      }

      .headline p {
        margin-top: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="toast" id="toast">پیام</div>

    <div class="top-actions">
      <input class="model-box" id="modelInput" value="auto" aria-label="model" />
      <button class="clear-btn" id="clearButton" type="button">Clear</button>
    </div>

    <section class="hero" id="hero">
      <div class="hero-main">
        <div class="bot-wrap" aria-hidden="true">
          <div class="neon-ring"></div>
          <div class="star"></div>

          <div class="bot">
            <div class="body-shape"></div>
            <div class="hood"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="lock"></div>
          </div>
        </div>

        <div class="headline">
          <h1>
            <span class="white">Where should</span>
            <span class="blue">we start?</span>
          </h1>
          <p>I’m here to help. Just ask anything.</p>
        </div>
      </div>
    </section>

    <section class="chat-layer">
      <div class="messages" id="messages"></div>
    </section>

    <form class="composer" id="chatForm">
      <div class="input-shell">
        <button class="icon-btn" id="plusButton" type="button" title="New chat">
          <svg viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>

        <textarea id="messageInput" rows="1" placeholder="Ask anything..."></textarea>

        <button class="mic-btn" id="micButton" type="button" title="Voice">
          <svg viewBox="0 0 24 24">
            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
            <path d="M19 11a7 7 0 0 1-14 0" />
            <path d="M12 18v3" />
            <path d="M8 21h8" />
          </svg>
        </button>

        <button class="send-btn" id="sendButton" type="submit" title="Send">
          <svg viewBox="0 0 24 24">
            <path d="M12 19V5" />
            <path d="M5 12l7-7 7 7" />
          </svg>
        </button>
      </div>
    </form>
  </main>

  <script>
    const hero = document.getElementById("hero");
    const messagesEl = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const modelInput = document.getElementById("modelInput");
    const sendButton = document.getElementById("sendButton");
    const clearButton = document.getElementById("clearButton");
    const plusButton = document.getElementById("plusButton");
    const micButton = document.getElementById("micButton");
    const toast = document.getElementById("toast");

    let conversation = [];
    let toastTimer;

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function activateChat() {
      hero.classList.add("hidden");
      messagesEl.classList.add("active");
    }

    function deactivateChat() {
      hero.classList.remove("hidden");
      messagesEl.classList.remove("active");
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function autoResize() {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 132) + "px";
    }

    function setLoading(isLoading) {
      sendButton.disabled = isLoading;
      messageInput.disabled = isLoading;
    }

    function addMessage(role, content, typing = false) {
      activateChat();

      const row = document.createElement("div");
      row.className = "msg " + role;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (typing) {
        bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      } else {
        bubble.textContent = content;
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();

      return row;
    }

    function resetChat() {
      conversation = [];
      messagesEl.innerHTML = "";
      deactivateChat();
      messageInput.value = "";
      autoResize();
      messageInput.focus();
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      const model = modelInput.value.trim() || "auto";

      if (!message) return;

      messageInput.value = "";
      autoResize();
      setLoading(true);

      addMessage("user", message);
      conversation.push({ role: "user", content: message });

      const typingRow = addMessage("assistant", "", true);

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model,
            messages: conversation
          })
        });

        const data = await response.json();
        typingRow.remove();

        if (!response.ok) {
          const details = data?.details
            ? JSON.stringify(data.details, null, 2)
            : JSON.stringify(data, null, 2);

          addMessage("assistant", "Error:\n" + details);
          return;
        }

        const answer = data.answer || JSON.stringify(data.raw, null, 2);

        addMessage("assistant", answer);
        conversation.push({ role: "assistant", content: answer });
      } catch (error) {
        typingRow.remove();
        addMessage("assistant", "Connection error:\n" + error.message);
      } finally {
        setLoading(false);
        messageInput.focus();
      }
    }

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage();
    });

    messageInput.addEventListener("input", autoResize);

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    clearButton.addEventListener("click", resetChat);
    plusButton.addEventListener("click", resetChat);

    micButton.addEventListener("click", () => {
      showToast("Voice input هنوز فعال نشده است");
    });

    messageInput.focus();
  </script>
</body>
</html>
