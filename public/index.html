<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>چت با مدل Auto</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    .desc {
      margin: 0 0 20px;
      color: #94a3b8;
      line-height: 1.8;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }

    textarea,
    input,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #020617;
      color: #e5e7eb;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.8;
    }

    input {
      margin-bottom: 12px;
    }

    button {
      border: 0;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      margin-top: 12px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      align-items: end;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.8;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
      min-height: 120px;
      direction: rtl;
      margin-bottom: 0;
    }

    .hint {
      margin-top: 12px;
      color: #64748b;
      font-size: 13px;
      line-height: 1.8;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>چت با مدل Auto</h1>

    <p class="desc">
      این صفحه به بک‌اند Railway وصل می‌شود. کلید API فقط روی سرور نگهداری می‌شود و در مرورگر نمایش داده نمی‌شود.
    </p>

    <div class="grid">
      <div>
        <label for="message">پیام شما</label>
        <textarea id="message" placeholder="مثلاً: یک متن تبلیغاتی کوتاه برای فروشگاه آنلاین بنویس"></textarea>
      </div>

      <div>
        <label for="model">مدل</label>
        <input id="model" value="auto" placeholder="auto" />

        <button id="sendButton">ارسال</button>
      </div>
    </div>

    <p class="hint">
      اگر فیلد مدل را خالی بگذاری، بک‌اند به‌صورت پیش‌فرض از مدل auto استفاده می‌کند.
    </p>

    <label style="margin-top: 20px;">پاسخ مدل</label>
    <pre id="output">هنوز پیامی ارسال نشده است.</pre>
  </main>

  <script>
    const messageInput = document.getElementById("message");
    const modelInput = document.getElementById("model");
    const sendButton = document.getElementById("sendButton");
    const output = document.getElementById("output");

    sendButton.addEventListener("click", async () => {
      const message = messageInput.value.trim();
      const model = modelInput.value.trim();

      if (!message) {
        output.textContent = "لطفاً یک پیام بنویس.";
        return;
      }

      sendButton.disabled = true;
      output.textContent = "در حال دریافت پاسخ...";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            model: model || "auto"
          })
        });

        const data = await response.json();

        if (!response.ok) {
          output.textContent = "خطا:\n" + JSON.stringify(data, null, 2);
          return;
        }

        output.textContent = data.answer || JSON.stringify(data.raw, null, 2);
      } catch (error) {
        output.textContent = "خطای اتصال:\n" + error.message;
      } finally {
        sendButton.disabled = false;
      }
    });
  </script>
</body>
</html>
